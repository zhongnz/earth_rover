version: '3.8'

services:
  app:
    build: .
    environment:
      - DEBUG=true
      - BOT_SLUG=your-bot-slug
      - SDK_API_TOKEN=your-sdk-api-token
      - MAP_ZOOM_LEVEL=18
      - IMAGE_FORMAT=jpeg
      - IMAGE_QUALITY=0.8
      - BROWSER_ENGINE=webkit
      - BROWSER_HEADLESS=true
      - SDK_BASE_URL=http://127.0.0.1:8000
    ports:
      - "8000:8000"
    volumes:
      - ./screenshots:/app/screenshots
